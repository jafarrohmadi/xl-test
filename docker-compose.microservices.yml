version: '3.8'

services:
  # --- DATABASES ---
  sf-backend-db:
    image: postgres:15-alpine
    container_name: sf-backend-db
    environment:
      POSTGRES_DB: sf_backend_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - xlsmart-network
    volumes:
      - ./sf_backend/database/sf_backend.sql:/docker-entrypoint-initdb.d/init.sql

  sf-payment-db:
    image: postgres:15-alpine
    container_name: sf-payment-db
    environment:
      POSTGRES_DB: sf_payment_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - xlsmart-network
    volumes:
      - ./sf_payment/database/sf_payment.sql:/docker-entrypoint-initdb.d/init.sql

  partner-db:
    image: postgres:15-alpine
    container_name: partner-db
    environment:
      POSTGRES_DB: partner_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - xlsmart-network
    volumes:
      - ./partner/database/partner.sql:/docker-entrypoint-initdb.d/init.sql

  # --- MICROSERVICES ---
  sf-backend:
    build: ./sf_backend
    container_name: sf-backend
    ports:
      - "8081:8081"
    environment:
      DATABASE_URL: postgres://postgres:postgres@sf-backend-db:5432/sf_backend_db?sslmode=disable
      SF_PAYMENT_URL: http://sf-payment:8082
      PARTNER_URL: http://partner:8083
      PORT: 8081
    depends_on:
      sf-backend-db:
        condition: service_healthy
    networks:
      - xlsmart-network

  sf-payment:
    build: ./sf_payment
    container_name: sf-payment
    ports:
      - "8082:8082"
    environment:
      DATABASE_URL: postgres://postgres:postgres@sf-payment-db:5432/sf_payment_db?sslmode=disable
      PORT: 8082
    depends_on:
      sf-payment-db:
        condition: service_healthy
    networks:
      - xlsmart-network

  partner:
    build: ./partner
    container_name: partner
    ports:
      - "8083:8083"
    environment:
      DATABASE_URL: postgres://postgres:postgres@partner-db:5432/partner_db?sslmode=disable
      SF_BACKEND_CALLBACK_URL: http://sf-backend:8081/orders/fulfillment/callback
      PORT: 8083
    depends_on:
      partner-db:
        condition: service_healthy
    networks:
      - xlsmart-network

networks:
  xlsmart-network:
    driver: bridge
